plugins { id 'com.android.application' }

android {
    namespace 'com.sw.launcher'
    compileSdk 35

    defaultConfig {
        applicationId 'com.sw.launcher'
        minSdk 23
        targetSdk 35
        versionCode 8
        versionName '0.8'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
