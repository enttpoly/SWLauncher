plugins {
    id 'com.android.application'
}

android {
    namespace 'com.sw.launcher'
    compileSdk 37

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId 'com.sw.launcher'
        minSdk 23
        targetSdk 37
        versionCode 2
        versionName '0.4'
    }
}
